<!DOCTYPE html>
<html>
<head>
    <title>GitPulse</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #060a10;
            color: #e6edf3;
            font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
            padding: 64px 24px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(circle, rgba(45, 212, 191, 0.18), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #5eead4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .subtitle {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 36px;
        }

        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 40px;
        }

        #usernameInput {
            flex: 1;
            background: rgba(22, 27, 34, 0.7);
            border: 1px solid #2dd4bf33;
            color: #e6edf3;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            backdrop-filter: blur(8px);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #usernameInput:focus {
            outline: none;
            border-color: #2dd4bf;
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15);
        }

        button {
            background: linear-gradient(135deg, #2dd4bf, #0ea5a0);
            color: #04342c;
            border: none;
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
        }

        button:hover {
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.4);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #30363d;
            color: #8b949e;
            cursor: default;
            box-shadow: none;
        }

        #output {
            display: none;
            animation: fadeUp 0.5s ease;
        }

        #output.visible {
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }

        .metric-card {
            background: rgba(22, 27, 34, 0.6);
            border: 1px solid #2dd4bf22;
            border-radius: 12px;
            padding: 18px;
            backdrop-filter: blur(8px);
            transition: border-color 0.2s, transform 0.2s;
        }

        .metric-card:hover {
            border-color: #2dd4bf66;
            transform: translateY(-2px);
        }

        .metric-label {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 600;
            color: #f0f6fc;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #5eead4;
            margin: 32px 0 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .repo-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(22, 27, 34, 0.6);
            border: 1px solid #2dd4bf1a;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 8px;
            font-size: 14px;
            transition: border-color 0.2s, transform 0.2s;
        }

        .repo-row:hover {
            border-color: #2dd4bf55;
            transform: translateX(2px);
        }

        .repo-stats {
            display: flex;
            gap: 16px;
            color: #8b949e;
            font-size: 13px;
        }

        .error {
            color: #f85149;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .error.visible {
            display: block;
        }

        .loading {
            color: #5eead4;
            font-size: 14px;
            display: none;
        }

        .loading.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitPulse</h1>
        <p class="subtitle">Enter any public GitHub username to see their activity snapshot.</p>

        <div class="search-row">
            <input type="text" id="usernameInput" placeholder="e.g. TP200613" />
            <button id="fetchBtn" onclick="fetchSnapshot()">Get snapshot</button>
        </div>

        <p class="loading" id="loading">Fetching live data from GitHub...</p>
        <p class="error" id="error"></p>

        <div id="output">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Top language</div>
                    <div class="metric-value" id="topLanguage">—</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Most active day</div>
                    <div class="metric-value" id="mostActiveDay">—</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Longest streak</div>
                    <div class="metric-value" id="longestStreak">—</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Active days (90d)</div>
                    <div class="metric-value" id="activeDays">—</div>
                </div>
            </div>

            <div class="section-title">Top repos</div>
            <div id="topRepos"></div>
        </div>
    </div>

    <script>
        async function fetchSnapshot() {
            const username = document.getElementById("usernameInput").value.trim();
            const output = document.getElementById("output");
            const loading = document.getElementById("loading");
            const errorBox = document.getElementById("error");
            const btn = document.getElementById("fetchBtn");

            output.classList.remove("visible");
            errorBox.classList.remove("visible");

            if (!username) {
                errorBox.textContent = "Please enter a username.";
                errorBox.classList.add("visible");
                return;
            }

            loading.classList.add("visible");
            btn.disabled = true;

            try {
                const response = await fetch(`http://127.0.0.1:5000/api/snapshot/${username}`);

                if (!response.ok) {
                    throw new Error("User not found or an error occurred.");
                }

                const data = await response.json();

                document.getElementById("topLanguage").textContent = data.top_language || "N/A";
                document.getElementById("mostActiveDay").textContent = data.most_active_day || "N/A";
                document.getElementById("longestStreak").textContent = data.longest_streak + " days";
                document.getElementById("activeDays").textContent = data.active_days_last_90;

                const reposContainer = document.getElementById("topRepos");
                reposContainer.innerHTML = "";

                data.top_repos.forEach(repo => {
                    const row = document.createElement("div");
                    row.className = "repo-row";
                    row.innerHTML = `
                        <span>${repo.name}</span>
                        <span class="repo-stats">
                            <span>★ ${repo.stars}</span>
                            <span>⑂ ${repo.forks}</span>
                        </span>
                    `;
                    reposContainer.appendChild(row);
                });

                output.classList.add("visible");

            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.classList.add("visible");
            } finally {
                loading.classList.remove("visible");
                btn.disabled = false;
            }
        }

        document.getElementById("usernameInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                fetchSnapshot();
            }
        });
    </script>
</body>
</html>
